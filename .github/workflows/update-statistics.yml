name: Update Taxonomic Archive

on:
  workflow_dispatch:

  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: speciedex-taxonomy-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: Scan and update taxonomic archive
    runs-on: ubuntu-latest
    timeout-minutes: 14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          check-latest: true

      - name: Validate Python source
        run: |
          python -m py_compile static/tools/stat-grabber.py
          python -m compileall -q static/tools/core static/tools/providers

      - name: Validate provider registry
        run: |
          python -m json.tool \
            static/tools/providers.json \
            >/dev/null

      - name: Verify provider module coverage
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          registry_path = Path(
              "static/tools/providers.json"
          )
          providers_path = Path(
              "static/tools/providers"
          )

          registry = json.loads(
              registry_path.read_text(
                  encoding="utf-8"
              )
          )

          providers = registry.get(
              "providers"
          )

          if not isinstance(providers, list):
              raise SystemExit(
                  "providers.json does not contain "
                  "a providers list."
              )

          valid_name = re.compile(
              r"^[a-z0-9_]+$"
          )

          names = []
          missing = []
          invalid = []
          duplicates = []
          missing_classes = []

          for definition in providers:
              if not isinstance(
                  definition,
                  dict,
              ):
                  invalid.append(
                      repr(definition)
                  )
                  continue

              name = str(
                  definition.get(
                      "name",
                      "",
                  )
              ).strip()

              if not valid_name.fullmatch(name):
                  invalid.append(name)
                  continue

              if name in names:
                  duplicates.append(name)
                  continue

              names.append(name)

              module_path = (
                  providers_path
                  / f"{name}.py"
              )

              if not module_path.is_file():
                  missing.append(
                      module_path.as_posix()
                  )
                  continue

              source = module_path.read_text(
                  encoding="utf-8"
              )

              if "class Provider" not in source:
                  missing_classes.append(
                      module_path.as_posix()
                  )

          errors = []

          if invalid:
              errors.append(
                  "Invalid provider names or entries:\n"
                  + "\n".join(
                      f"  {value}"
                      for value in invalid
                  )
              )

          if duplicates:
              errors.append(
                  "Duplicate provider names:\n"
                  + "\n".join(
                      f"  {value}"
                      for value in duplicates
                  )
              )

          if missing:
              errors.append(
                  "Missing provider modules:\n"
                  + "\n".join(
                      f"  {value}"
                      for value in missing
                  )
              )

          if missing_classes:
              errors.append(
                  "Provider modules missing "
                  "`class Provider`:\n"
                  + "\n".join(
                      f"  {value}"
                      for value in missing_classes
                  )
              )

          if errors:
              raise SystemExit(
                  "\n\n".join(errors)
              )

          print(
              f"Validated {len(names)} "
              "registered provider modules."
          )
          PY

      - name: Display provider availability
        env:
          EOL_API_KEY: ${{ secrets.EOL_API_KEY }}
          IUCN_API_TOKEN: ${{ secrets.IUCN_API_TOKEN }}
          NATURESERVE_API_KEY: ${{ secrets.NATURESERVE_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: |
          python static/tools/stat-grabber.py \
            providers

      - name: Scan rotating providers
        env:
          EOL_API_KEY: ${{ secrets.EOL_API_KEY }}
          IUCN_API_TOKEN: ${{ secrets.IUCN_API_TOKEN }}
          NATURESERVE_API_KEY: ${{ secrets.NATURESERVE_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: |
          python static/tools/stat-grabber.py \
            scan \
            --batch-size 500 \
            --provider-budget 4 \
            --timeout 30 \
            --retries 4 \
            --backoff 2 \
            --volume-target-mb 48 \
            --volume-max-mb 90 \
            --history-limit 672 \
            --verbose

      - name: Rebuild statistics from complete archive
        run: |
          python static/tools/stat-grabber.py reindex \
            --history-limit 672

      - name: Verify taxonomic archive
        run: |
          python static/tools/stat-grabber.py \
            verify

      - name: Validate generated JSON
        run: |
          python -m json.tool \
            static/data/statistics.json \
            >/dev/null

          python -m json.tool \
            static/data/statistics-sources.json \
            >/dev/null

          python -m json.tool \
            static/data/statistics-history.json \
            >/dev/null

          if test -f \
            static/data/taxonomy/manifest.json
          then
            python -m json.tool \
              static/data/taxonomy/manifest.json \
              >/dev/null
          fi

          if test -f \
            static/data/taxonomy/scheduler.json
          then
            python -m json.tool \
              static/data/taxonomy/scheduler.json \
              >/dev/null
          fi

          if test -d \
            static/data/taxonomy/provider-state
          then
            find \
              static/data/taxonomy/provider-state \
              -type f \
              -name "*.json" \
              -print0 |
            while IFS= read -r -d '' file
            do
              python -m json.tool \
                "$file" \
                >/dev/null
            done
          fi

      - name: Validate taxonomic statistics semantics
        run: |
          python - <<'PY'
          import json
          import sqlite3
          from pathlib import Path

          stats_path = Path("static/data/statistics.json")
          db_path = Path("static/data/taxonomy/index.sqlite3")
          stats = json.loads(stats_path.read_text(encoding="utf-8"))

          required = (
              "species", "subspecies", "genera", "families",
              "orders", "classes", "phyla", "kingdoms",
              "records_archived", "source_assertions", "rank_counts",
          )
          missing = [key for key in required if key not in stats]
          if missing:
              raise SystemExit(f"Missing statistics keys: {', '.join(missing)}")

          aliases = {
              "genus": "genera", "family": "families",
              "order": "orders", "class": "classes",
              "phylum": "phyla", "kingdom": "kingdoms",
          }
          for singular, plural in aliases.items():
              if stats.get(singular) != stats.get(plural):
                  raise SystemExit(f"Statistics alias mismatch: {singular}/{plural}")

          for key in required[:-1]:
              if not isinstance(stats[key], int) or stats[key] < 0:
                  raise SystemExit(f"Invalid statistic {key}: {stats[key]!r}")

          if db_path.exists():
              db = sqlite3.connect(db_path)
              try:
                  lineage = {
                      "kingdoms": "kingdom", "phyla": "phylum",
                      "classes": "class_name", "orders": "order_name",
                      "families": "family", "genera": "genus",
                  }
                  for key, column in lineage.items():
                      available = db.execute(
                          f"SELECT COUNT(DISTINCT {column}) FROM taxa "
                          f"WHERE {column} <> ''"
                      ).fetchone()[0]
                      if available and stats[key] == 0:
                          raise SystemExit(
                              f"{key}=0 despite {available} distinct lineage values"
                          )
              finally:
                  db.close()

          print(json.dumps(stats, indent=2, sort_keys=True))
          PY

      - name: Remove temporary SQLite files
        run: |
          find static/data/taxonomy \
            -type f \
            \( \
              -name "*.sqlite3-wal" \
              -o \
              -name "*.sqlite3-shm" \
              -o \
              -name "*.sqlite-journal" \
            \) \
            -delete

      - name: Check archive file sizes
        run: |
          python - <<'PY'
          from pathlib import Path

          warning_limit = (
              90
              * 1024
              * 1024
          )

          failure_limit = (
              95
              * 1024
              * 1024
          )

          warnings = []
          failures = []

          for path in Path(
              "static/data"
          ).rglob("*"):
              if not path.is_file():
                  continue

              size = path.stat().st_size

              if size >= failure_limit:
                  failures.append(
                      (
                          path.as_posix(),
                          size,
                      )
                  )
              elif size >= warning_limit:
                  warnings.append(
                      (
                          path.as_posix(),
                          size,
                      )
                  )

          for path, size in warnings:
              print(
                  "WARNING: "
                  f"{path}: "
                  f"{size / 1024 / 1024:.2f} MiB"
              )

          if failures:
              for path, size in failures:
                  print(
                      "ERROR: "
                      f"{path}: "
                      f"{size / 1024 / 1024:.2f} MiB"
                  )

              raise SystemExit(
                  "One or more archive files "
                  "exceed the safe Git size limit."
              )

          print(
              "All archive files remain below "
              "the configured failure limit."
          )
          PY

      - name: Check for archive changes
        id: archive_changes
        run: |
          if git diff \
            --quiet \
            -- \
            static/data
          then
            printf '%s\n' \
              "changed=false" \
              >> "$GITHUB_OUTPUT"

            printf '%s\n' \
              "No taxonomic archive changes detected."
          else
            printf '%s\n' \
              "changed=true" \
              >> "$GITHUB_OUTPUT"

            printf '%s\n' \
              "Taxonomic archive changes detected."
          fi

      - name: Commit archive updates
        if: steps.archive_changes.outputs.changed == 'true'
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          git config \
            user.name \
            "speciedex-taxonomy-bot"

          git config \
            user.email \
            "speciedex-taxonomy-bot@users.noreply.github.com"

          git add \
            static/data

          git commit \
            -m "Update Speciedex taxonomic archive"

          for attempt in 1 2 3
          do
            printf \
              'Synchronizing with %s, attempt %s.\n' \
              "$TARGET_BRANCH" \
              "$attempt"

            if git pull \
              --rebase \
              origin \
              "$TARGET_BRANCH" &&
               git push \
              origin \
              "HEAD:$TARGET_BRANCH"
            then
              printf '%s\n' \
                "Taxonomic archive update pushed successfully."

              exit 0
            fi

            git rebase \
              --abort \
              2>/dev/null ||
              true

            sleep "$((attempt * 5))"
          done

          printf '%s\n' \
            "Unable to push the taxonomic archive update."

          exit 1
