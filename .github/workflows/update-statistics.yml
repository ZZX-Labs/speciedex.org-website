name: Update Taxonomic Archive

on:
  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: speciedex-taxonomy-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: Scan and update taxonomic archive
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          check-latest: true

      - name: Restore derived SQLite index cache
        id: sqlite_cache
        uses: actions/cache/restore@v4
        with:
          path: |
            static/data/taxonomy/index.sqlite3
          key: speciedex-sqlite-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            speciedex-sqlite-${{ runner.os }}-${{ github.ref_name }}-

      - name: Load optional provider credentials
        id: provider_credentials
        shell: bash
        env:
          SECRET_EOL_API_KEY: ${{ secrets.EOL_API_KEY }}
          SECRET_IUCN_API_TOKEN: ${{ secrets.IUCN_API_TOKEN }}
          SECRET_NATURESERVE_API_KEY: ${{ secrets.NATURESERVE_API_KEY }}
          SECRET_NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          SECRET_BACDIVE_USERNAME: ${{ secrets.BACDIVE_USERNAME }}
          SECRET_BACDIVE_PASSWORD: ${{ secrets.BACDIVE_PASSWORD }}
          SECRET_BHL_API_KEY: ${{ secrets.BHL_API_KEY }}
          SECRET_GEONAMES_USERNAME: ${{ secrets.GEONAMES_USERNAME }}
          SECRET_YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SECRET_GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          loaded=()
          missing=()

          export_secret() {
            local source_name="$1"
            local target_name="$2"
            local value="${!source_name:-}"

            if test -n "$value"
            then
              printf '%s=%s\n' \
                "$target_name" \
                "$value" \
                >> "$GITHUB_ENV"

              loaded+=("$target_name")
            else
              missing+=("$target_name")
            fi
          }

          export_secret SECRET_EOL_API_KEY EOL_API_KEY
          export_secret SECRET_IUCN_API_TOKEN IUCN_API_TOKEN
          export_secret SECRET_NATURESERVE_API_KEY NATURESERVE_API_KEY
          export_secret SECRET_NCBI_API_KEY NCBI_API_KEY
          export_secret SECRET_BACDIVE_USERNAME BACDIVE_USERNAME
          export_secret SECRET_BACDIVE_PASSWORD BACDIVE_PASSWORD
          export_secret SECRET_BHL_API_KEY BHL_API_KEY
          export_secret SECRET_GEONAMES_USERNAME GEONAMES_USERNAME
          export_secret SECRET_YOUTUBE_API_KEY YOUTUBE_API_KEY
          export_secret SECRET_GOOGLE_API_KEY GOOGLE_API_KEY

          printf 'loaded_count=%s\n' \
            "${#loaded[@]}" \
            >> "$GITHUB_OUTPUT"

          printf 'missing_count=%s\n' \
            "${#missing[@]}" \
            >> "$GITHUB_OUTPUT"

          printf 'Loaded optional credentials: %s\n' \
            "${loaded[*]:-none}"

          printf 'Unavailable optional credentials: %s\n' \
            "${missing[*]:-none}"

      - name: Validate Python source
        run: |
          python -m py_compile static/tools/stat-grabber.py
          python -m compileall -q \
            static/tools/core \
            static/tools/providers

      - name: Validate provider registry
        run: |
          python -m json.tool \
            static/tools/providers.json \
            >/dev/null

      - name: Verify provider module coverage
        run: |
          python - <<'PY'
          import importlib
          import json
          import re
          import sys
          from pathlib import Path

          repo_root = Path.cwd()
          tools_root = repo_root / "static" / "tools"
          providers_root = tools_root / "providers"
          registry_path = tools_root / "providers.json"

          sys.path.insert(
              0,
              str(tools_root),
          )

          registry = json.loads(
              registry_path.read_text(
                  encoding="utf-8"
              )
          )

          providers = registry.get("providers")

          if not isinstance(providers, list):
              raise SystemExit(
                  "providers.json does not contain a providers list."
              )

          valid_name = re.compile(
              r"^[a-z0-9_]+$"
          )

          names = []
          invalid = []
          duplicates = []
          missing = []
          import_failures = []
          missing_classes = []
          provider_name_mismatches = []
          missing_fetch = []

          for definition in providers:
              if not isinstance(definition, dict):
                  invalid.append(repr(definition))
                  continue

              name = str(
                  definition.get("name", "")
              ).strip()

              if not valid_name.fullmatch(name):
                  invalid.append(name)
                  continue

              if name in names:
                  duplicates.append(name)
                  continue

              names.append(name)

              module_path = (
                  providers_root
                  / f"{name}.py"
              )

              if not module_path.is_file():
                  missing.append(
                      module_path.as_posix()
                  )
                  continue

              module_name = str(
                  definition.get(
                      "module",
                      f"providers.{name}",
                  )
              ).strip()

              try:
                  module = importlib.import_module(
                      module_name
                  )
              except Exception as error:
                  import_failures.append(
                      f"{module_name}: "
                      f"{type(error).__name__}: {error}"
                  )
                  continue

              provider_class = getattr(
                  module,
                  "Provider",
                  None,
              )

              if provider_class is None:
                  missing_classes.append(
                      module_path.as_posix()
                  )
                  continue

              provider_name = str(
                  getattr(
                      provider_class,
                      "PROVIDER_NAME",
                      "",
                  )
              ).strip()

              if provider_name != name:
                  provider_name_mismatches.append(
                      f"{module_name}: "
                      f"PROVIDER_NAME={provider_name!r}, "
                      f"expected {name!r}"
                  )

              if not callable(
                  getattr(
                      provider_class,
                      "fetch",
                      None,
                  )
              ):
                  missing_fetch.append(
                      module_path.as_posix()
                  )

          errors = []

          if invalid:
              errors.append(
                  "Invalid provider names or entries:\n"
                  + "\n".join(
                      f"  {value}"
                      for value in invalid
                  )
              )

          if duplicates:
              errors.append(
                  "Duplicate provider names:\n"
                  + "\n".join(
                      f"  {value}"
                      for value in duplicates
                  )
              )

          if missing:
              errors.append(
                  "Missing provider modules:\n"
                  + "\n".join(
                      f"  {value}"
                      for value in missing
                  )
              )

          if import_failures:
              errors.append(
                  "Provider import failures:\n"
                  + "\n".join(
                      f"  {value}"
                      for value in import_failures
                  )
              )

          if missing_classes:
              errors.append(
                  "Provider modules missing Provider class:\n"
                  + "\n".join(
                      f"  {value}"
                      for value in missing_classes
                  )
              )

          if provider_name_mismatches:
              errors.append(
                  "Provider name mismatches:\n"
                  + "\n".join(
                      f"  {value}"
                      for value in provider_name_mismatches
                  )
              )

          if missing_fetch:
              errors.append(
                  "Provider classes missing fetch():\n"
                  + "\n".join(
                      f"  {value}"
                      for value in missing_fetch
                  )
              )

          if errors:
              raise SystemExit(
                  "\n\n".join(errors)
              )

          print(
              f"Validated {len(names)} "
              "registered provider modules."
          )
          PY

      - name: Rebuild missing derived SQLite index
        if: steps.sqlite_cache.outputs.cache-hit != 'true'
        run: |
          python static/tools/stat-grabber.py \
            reindex \
            --history-limit 1008

      - name: Display provider availability
        run: |
          python static/tools/stat-grabber.py \
            providers

      - name: Scan rotating providers
        run: |
          python static/tools/stat-grabber.py \
            scan \
            --batch-size 500 \
            --provider-budget 8 \
            --timeout 40 \
            --retries 5 \
            --backoff 2 \
            --volume-target-mb 48 \
            --volume-max-mb 90 \
            --history-limit 1008 \
            --verbose

      - name: Rebuild statistics from complete archive
        run: |
          python static/tools/stat-grabber.py \
            reindex \
            --history-limit 1008

      - name: Verify taxonomic archive
        run: |
          python static/tools/stat-grabber.py \
            verify

      - name: Validate generated JSON
        run: |
          python -m json.tool \
            static/data/statistics.json \
            >/dev/null

          python -m json.tool \
            static/data/statistics-sources.json \
            >/dev/null

          python -m json.tool \
            static/data/statistics-history.json \
            >/dev/null

          if test -f \
            static/data/taxonomy/manifest.json
          then
            python -m json.tool \
              static/data/taxonomy/manifest.json \
              >/dev/null
          fi

          if test -f \
            static/data/taxonomy/scheduler.json
          then
            python -m json.tool \
              static/data/taxonomy/scheduler.json \
              >/dev/null
          fi

          if test -d \
            static/data/taxonomy/provider-state
          then
            find \
              static/data/taxonomy/provider-state \
              -type f \
              -name "*.json" \
              -print0 |
            while IFS= read -r -d '' file
            do
              python -m json.tool \
                "$file" \
                >/dev/null
            done
          fi

      - name: Validate and normalize scheduler state
        run: |
          python - <<'PY'
          import json
          import os
          import tempfile
          from pathlib import Path

          path = Path(
              "static/data/taxonomy/scheduler.json"
          )

          if not path.exists():
              print(
                  "No scheduler state file exists yet."
              )
              raise SystemExit(0)

          state = json.loads(
              path.read_text(
                  encoding="utf-8"
              )
          )

          if not isinstance(state, dict):
              raise SystemExit(
                  "Scheduler state root must be an object."
              )

          changed = False

          def integer_value(value, *, field, minimum=0):
              nonlocal_changed = False

              if isinstance(value, bool):
                  raise SystemExit(
                      f"Scheduler field {field} cannot be boolean."
                  )

              if isinstance(value, int):
                  result = value
              elif isinstance(value, float) and value.is_integer():
                  result = int(value)
                  nonlocal_changed = True
              elif isinstance(value, str):
                  stripped = value.strip()

                  if not stripped or not stripped.lstrip("+-").isdigit():
                      raise SystemExit(
                          f"Scheduler field {field} must be an integer; "
                          f"received {value!r}."
                      )

                  result = int(stripped)
                  nonlocal_changed = True
              else:
                  raise SystemExit(
                      f"Scheduler field {field} must be an integer; "
                      f"received {value!r}."
                  )

              if result < minimum:
                  raise SystemExit(
                      f"Scheduler field {field} must be >= {minimum}; "
                      f"received {result}."
                  )

              return result, nonlocal_changed

          schema_version, migrated = integer_value(
              state.get("schema_version", 1),
              field="schema_version",
              minimum=1,
          )
          state["schema_version"] = schema_version
          changed = changed or migrated

          cursor, migrated = integer_value(
              state.get("cursor", 0),
              field="cursor",
          )
          state["cursor"] = cursor
          changed = changed or migrated

          for key in ("registered", "eligible"):
              value, migrated = integer_value(
                  state.get(key, 0),
                  field=key,
              )
              state[key] = value
              changed = changed or migrated

          providers = state.get("providers", {})

          if not isinstance(providers, dict):
              raise SystemExit(
                  "Scheduler providers must be an object."
              )

          integer_fields = (
              "consecutive_failures",
              "total_runs",
              "total_successes",
              "total_failures",
              "last_records",
              "total_records",
              "total_requests",
              "empty_successes",
          )

          for name, provider in providers.items():
              if not isinstance(provider, dict):
                  raise SystemExit(
                      f"Invalid scheduler state for {name}."
                  )

              for key in integer_fields:
                  value, migrated = integer_value(
                      provider.get(key, 0),
                      field=f"providers.{name}.{key}",
                  )
                  provider[key] = value
                  changed = changed or migrated

          if changed:
              path.parent.mkdir(
                  parents=True,
                  exist_ok=True,
              )

              descriptor, temporary_name = tempfile.mkstemp(
                  prefix=f".{path.name}.",
                  suffix=".tmp",
                  dir=path.parent,
                  text=True,
              )

              try:
                  with os.fdopen(
                      descriptor,
                      "w",
                      encoding="utf-8",
                      newline="\n",
                  ) as handle:
                      json.dump(
                          state,
                          handle,
                          indent=2,
                          ensure_ascii=False,
                          sort_keys=True,
                      )
                      handle.write("\n")
                      handle.flush()
                      os.fsync(handle.fileno())

                  Path(temporary_name).replace(path)

              finally:
                  temporary = Path(temporary_name)

                  if temporary.exists():
                      temporary.unlink()

              print(
                  "Normalized scheduler numeric fields to integers."
              )

          print(
              f"Validated scheduler state for "
              f"{len(providers)} providers; "
              f"schema_version={schema_version}; "
              f"cursor={cursor}."
          )
          PY

      - name: Validate taxonomic statistics semantics
        run: |
          python - <<'PY'
          import json
          import sqlite3
          from pathlib import Path

          stats_path = Path(
              "static/data/statistics.json"
          )
          db_path = Path(
              "static/data/taxonomy/index.sqlite3"
          )

          stats = json.loads(
              stats_path.read_text(
                  encoding="utf-8"
              )
          )

          required = (
              "species",
              "subspecies",
              "genera",
              "families",
              "orders",
              "classes",
              "phyla",
              "kingdoms",
              "records_archived",
              "source_assertions",
              "rank_counts",
          )

          missing = [
              key
              for key in required
              if key not in stats
          ]

          if missing:
              raise SystemExit(
                  "Missing statistics keys: "
                  + ", ".join(missing)
              )

          aliases = {
              "genus": "genera",
              "family": "families",
              "order": "orders",
              "class": "classes",
              "phylum": "phyla",
              "kingdom": "kingdoms",
          }

          for singular, plural in aliases.items():
              if stats.get(singular) != stats.get(plural):
                  raise SystemExit(
                      "Statistics alias mismatch: "
                      f"{singular}/{plural}"
                  )

          for key in required[:-1]:
              if (
                  not isinstance(stats[key], int)
                  or stats[key] < 0
              ):
                  raise SystemExit(
                      f"Invalid statistic "
                      f"{key}: {stats[key]!r}"
                  )

          if not isinstance(
              stats["rank_counts"],
              dict,
          ):
              raise SystemExit(
                  "rank_counts must be an object."
              )

          if db_path.exists():
              db = sqlite3.connect(db_path)
              db.row_factory = sqlite3.Row

              try:
                  active_statuses = stats.get(
                      "active_statuses",
                      [
                          "accepted",
                          "valid",
                          "provisionally accepted",
                          "unknown",
                          "reference",
                      ],
                  )

                  if not isinstance(active_statuses, list):
                      raise SystemExit(
                          "active_statuses must be an array."
                      )

                  active_statuses = tuple(
                      sorted(
                          {
                              str(status).strip().casefold()
                              for status in active_statuses
                              if str(status).strip()
                          }
                      )
                  )

                  if not active_statuses:
                      raise SystemExit(
                          "active_statuses cannot be empty."
                      )

                  placeholders = ",".join(
                      "?"
                      for _ in active_statuses
                  )

                  lineage = {
                      "kingdoms": (
                          "kingdom",
                          "kingdom",
                      ),
                      "phyla": (
                          "phylum",
                          "phylum",
                      ),
                      "classes": (
                          "class_name",
                          "class",
                      ),
                      "orders": (
                          "order_name",
                          "order",
                      ),
                      "families": (
                          "family",
                          "family",
                      ),
                      "genera": (
                          "genus",
                          "genus",
                      ),
                  }

                  for key, (
                      column,
                      rank,
                  ) in lineage.items():
                      query = f"""
                          SELECT COUNT(DISTINCT name) AS count
                          FROM (
                              SELECT canonical_name AS name
                              FROM taxa
                              WHERE rank = ?
                                AND status IN ({placeholders})
                                AND canonical_name <> ''
                              UNION
                              SELECT {column} AS name
                              FROM taxa
                              WHERE status IN ({placeholders})
                                AND {column} <> ''
                          )
                      """

                      available = int(
                          db.execute(
                              query,
                              (
                                  rank,
                                  *active_statuses,
                                  *active_statuses,
                              ),
                          ).fetchone()["count"]
                      )

                      if stats[key] != available:
                          raise SystemExit(
                              f"{key} mismatch: "
                              f"statistics={stats[key]}, "
                              f"sqlite={available}"
                          )

                  species = int(
                      db.execute(
                          (
                              "SELECT COUNT(DISTINCT speciedex_id) "
                              "AS count "
                              "FROM taxa "
                              "WHERE rank = 'species' "
                              f"AND status IN ({placeholders})"
                          ),
                          active_statuses,
                      ).fetchone()["count"]
                  )

                  if stats["species"] != species:
                      raise SystemExit(
                          "species mismatch: "
                          f"statistics={stats['species']}, "
                          f"sqlite={species}"
                      )

                  subspecies = int(
                      db.execute(
                          (
                              "SELECT COUNT(DISTINCT speciedex_id) "
                              "AS count "
                              "FROM taxa "
                              "WHERE rank = 'subspecies' "
                              f"AND status IN ({placeholders})"
                          ),
                          active_statuses,
                      ).fetchone()["count"]
                  )

                  if stats["subspecies"] != subspecies:
                      raise SystemExit(
                          "subspecies mismatch: "
                          f"statistics={stats['subspecies']}, "
                          f"sqlite={subspecies}"
                      )

              finally:
                  db.close()

          print(
              json.dumps(
                  stats,
                  indent=2,
                  sort_keys=True,
              )
          )
          PY

      - name: Save derived SQLite index cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            static/data/taxonomy/index.sqlite3
          key: speciedex-sqlite-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Remove derived SQLite index before Git commit
        run: |
          rm -f \
            static/data/taxonomy/index.sqlite3 \
            static/data/taxonomy/index.sqlite3-wal \
            static/data/taxonomy/index.sqlite3-shm \
            static/data/taxonomy/index.sqlite3-journal

      - name: Remove temporary SQLite files
        run: |
          if test -d static/data/taxonomy
          then
            find static/data/taxonomy \
              -type f \
              \( \
                -name "*.sqlite3-wal" \
                -o \
                -name "*.sqlite3-shm" \
                -o \
                -name "*.sqlite-journal" \
              \) \
              -delete
          fi

      - name: Check archive file sizes
        run: |
          python - <<'PY'
          from pathlib import Path

          warning_limit = 90 * 1024 * 1024
          failure_limit = 95 * 1024 * 1024

          warnings = []
          failures = []

          sqlite_suffixes = {
              ".sqlite",
              ".sqlite3",
              ".db",
          }

          for path in Path(
              "static/data"
          ).rglob("*"):
              if not path.is_file():
                  continue

              if (
                  path.suffix.lower() in sqlite_suffixes
                  or path.name.endswith(
                      (
                          "-wal",
                          "-shm",
                          "-journal",
                      )
                  )
              ):
                  continue

              size = path.stat().st_size

              if size >= failure_limit:
                  failures.append(
                      (
                          path.as_posix(),
                          size,
                      )
                  )

              elif size >= warning_limit:
                  warnings.append(
                      (
                          path.as_posix(),
                          size,
                      )
                  )

          for path, size in warnings:
              print(
                  "WARNING: "
                  f"{path}: "
                  f"{size / 1024 / 1024:.2f} MiB"
              )

          if failures:
              for path, size in failures:
                  print(
                      "ERROR: "
                      f"{path}: "
                      f"{size / 1024 / 1024:.2f} MiB"
                  )

              raise SystemExit(
                  "One or more archive files "
                  "exceed the safe Git size limit."
              )

          print(
              "All archive files remain below "
              "the configured failure limit."
          )
          PY

      - name: Write workflow summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          LOADED_CREDENTIAL_COUNT: ${{ steps.provider_credentials.outputs.loaded_count }}
          MISSING_CREDENTIAL_COUNT: ${{ steps.provider_credentials.outputs.missing_count }}
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          stats_path = Path(
              "static/data/statistics.json"
          )
          scheduler_path = Path(
              "static/data/taxonomy/scheduler.json"
          )

          stats = {}
          scheduler = {}

          if stats_path.exists():
              try:
                  stats = json.loads(
                      stats_path.read_text(
                          encoding="utf-8"
                      )
                  )
              except Exception:
                  stats = {}

          if scheduler_path.exists():
              try:
                  scheduler = json.loads(
                      scheduler_path.read_text(
                          encoding="utf-8"
                      )
                  )
              except Exception:
                  scheduler = {}

          print("# Speciedex Taxonomic Archive")
          print()
          print("| Metric | Value |")
          print("|---|---:|")

          metrics = (
              ("Species", stats.get("species", 0)),
              ("Subspecies", stats.get("subspecies", 0)),
              ("Genera", stats.get("genera", 0)),
              ("Families", stats.get("families", 0)),
              ("Orders", stats.get("orders", 0)),
              ("Classes", stats.get("classes", 0)),
              ("Phyla", stats.get("phyla", 0)),
              ("Kingdoms", stats.get("kingdoms", 0)),
              (
                  "Records archived",
                  stats.get("records_archived", 0),
              ),
              (
                  "Source assertions",
                  stats.get("source_assertions", 0),
              ),
              (
                  "Scheduler cursor",
                  scheduler.get("cursor", 0),
              ),
              (
                  "Eligible providers",
                  scheduler.get("eligible", 0),
              ),
              (
                  "Optional credentials loaded",
                  os.environ.get(
                      "LOADED_CREDENTIAL_COUNT",
                      "0",
                  ),
              ),
              (
                  "Optional credentials unavailable",
                  os.environ.get(
                      "MISSING_CREDENTIAL_COUNT",
                      "0",
                  ),
              ),
          )

          for label, value in metrics:
              print(
                  f"| {label} | {value} |"
              )

          print()
          print(
              "Workflow status: "
              + os.environ.get(
                  "JOB_STATUS",
                  "unknown",
              )
          )
          PY

      - name: Check for archive changes
        id: archive_changes
        run: |
          if git diff \
            --quiet \
            -- \
            static/data
          then
            printf '%s\n' \
              "changed=false" \
              >> "$GITHUB_OUTPUT"

            printf '%s\n' \
              "No taxonomic archive changes detected."
          else
            printf '%s\n' \
              "changed=true" \
              >> "$GITHUB_OUTPUT"

            printf '%s\n' \
              "Taxonomic archive changes detected."
          fi

      - name: Commit archive updates
        if: steps.archive_changes.outputs.changed == 'true'
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          git config \
            user.name \
            "speciedex-taxonomy-bot"

          git config \
            user.email \
            "speciedex-taxonomy-bot@users.noreply.github.com"

          git add \
            static/data

          git commit \
            -m "Update Speciedex taxonomic archive"

          for attempt in 1 2 3
          do
            printf \
              'Synchronizing with %s, attempt %s.\n' \
              "$TARGET_BRANCH" \
              "$attempt"

            if git pull \
              --rebase \
              origin \
              "$TARGET_BRANCH" &&
               git push \
              origin \
              "HEAD:$TARGET_BRANCH"
            then
              printf '%s\n' \
                "Taxonomic archive update pushed successfully."

              exit 0
            fi

            git rebase \
              --abort \
              2>/dev/null ||
              true

            sleep "$((attempt * 5))"
          done

          printf '%s\n' \
            "Unable to push the taxonomic archive update."

          exit 1
