name: Update Speciedex Icons

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: Regenerate every indexed taxon icon
        required: false
        default: false
        type: boolean
      icon_size:
        description: Master icon size
        required: false
        default: "1024"
        type: choice
        options:
          - "512"
          - "1024"
          - "2048"

  schedule:
    - cron: "17 4 * * 1"

  push:
    branches:
      - main
    paths:
      - "static/data/taxonomy/**"
      - "static/config/**"
      - "static/tools/icon-forge.py"
      - "static/tools/icon-forge/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/update-icons.yml"

permissions:
  contents: write

concurrency:
  group: speciedex-icon-update-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  update-icons:
    name: Build and publish taxonomic glyphs
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

      ICON_FORGE: static/tools/icon-forge.py
      TOOL_DIR: static/tools/icon-forge
      FETCHER: static/tools/icon-forge/fetch-taxonomy.py
      NORMALIZER: static/tools/icon-forge/normalize-taxonomy.py
      ENRICHER: static/tools/icon-forge/enrich-taxonomy.py
      ICON_INDEX: static/tools/icon-forge/icon-index.py
      ICON_BUILDER: static/tools/icon-forge/build-icons.py
      DERIVATIVE_BUILDER: static/tools/icon-forge/build-icon-derivatives.py
      SPRITE_BUILDER: static/tools/icon-forge/build-sprites.py
      ICON_VERIFIER: static/tools/icon-forge/verify-icons.py

      TAXONOMY_DB: static/data/taxonomy/index.sqlite3
      RAW_DIR: static/data/taxonomy/raw
      NORMALIZED_FILE: static/data/taxonomy/normalized/all-taxa.jsonl
      ENRICHED_FILE: static/data/taxonomy/normalized/all-taxa-enriched.jsonl
      QUEUE_FILE: static/data/taxonomy/normalized/icon-queue.jsonl
      REJECTED_FILE: static/data/taxonomy/rejected/invalid-records.jsonl

      MASTER_DIR: static/images/taxa/master
      ICON_ROOT: static/images/taxa
      MANIFEST_FILE: static/data/icons/icon-manifest.json
      REPORT_FILE: static/data/icons/generation-report.json
      CHECKSUM_FILE: static/data/icons/SHA256SUMS
      SPRITE_FILE: static/images/taxa/sprites/taxa-64.png
      SPRITE_INDEX: static/data/icons/sprite-index.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          set -Eeuo pipefail

          python -m pip install --upgrade pip

          if [[ -f requirements.txt ]]; then
            python -m pip install -r requirements.txt
          elif [[ -f pyproject.toml ]]; then
            python -m pip install .
          else
            python -m pip install "Pillow>=10.0"
          fi

      - name: Validate required files
        run: |
          set -Eeuo pipefail

          required_files=(
            "$ICON_FORGE"
            "$FETCHER"
            "$NORMALIZER"
            "$ENRICHER"
            "$ICON_INDEX"
            "$ICON_BUILDER"
            "$DERIVATIVE_BUILDER"
            "$SPRITE_BUILDER"
            "$ICON_VERIFIER"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              printf 'Missing required file: %s\n' "$file" >&2
              exit 1
            fi
          done

          mkdir -p \
            "$RAW_DIR" \
            "$(dirname "$NORMALIZED_FILE")" \
            "$(dirname "$REJECTED_FILE")" \
            "$(dirname "$MANIFEST_FILE")" \
            "$MASTER_DIR" \
            "$(dirname "$SPRITE_FILE")"

      - name: Determine build mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_ICON_SIZE: ${{ inputs.icon_size || '1024' }}
          FORCE_REBUILD_REQUESTED: ${{ inputs.force_rebuild || false }}
        run: |
          set -Eeuo pipefail

          icon_size="1024"
          force_rebuild="false"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            icon_size="$REQUESTED_ICON_SIZE"
            force_rebuild="$FORCE_REBUILD_REQUESTED"
          fi

          case "$icon_size" in
            512|1024|2048)
              ;;
            *)
              printf 'Invalid icon size: %s\n' "$icon_size" >&2
              exit 1
              ;;
          esac

          printf 'ICON_SIZE=%s\n' "$icon_size" >> "$GITHUB_ENV"
          printf 'FORCE_REBUILD=%s\n' "$force_rebuild" >> "$GITHUB_ENV"

      - name: Ensure raw taxonomy exists
        run: |
          set -Eeuo pipefail

          raw_count="$(
            find "$RAW_DIR" \
              -type f \
              \( -name '*.json' -o -name '*.jsonl' -o -name '*.ndjson' \) \
              | wc -l
          )"

          if [[ "$raw_count" -eq 0 ]]; then
            python "$FETCHER" \
              --output-dir "$RAW_DIR" \
              --providers bootstrap
          fi

          raw_count="$(
            find "$RAW_DIR" \
              -type f \
              \( -name '*.json' -o -name '*.jsonl' -o -name '*.ndjson' \) \
              | wc -l
          )"

          if [[ "$raw_count" -eq 0 ]]; then
            printf 'No raw taxonomy files are available.\n' >&2
            exit 1
          fi

          printf 'raw_taxonomy_files=%s\n' "$raw_count"

      - name: Normalize taxonomy
        run: |
          set -Eeuo pipefail

          python "$NORMALIZER" \
            --input "$RAW_DIR" \
            --output "$NORMALIZED_FILE" \
            --rejected "$REJECTED_FILE"

          if [[ ! -s "$NORMALIZED_FILE" ]]; then
            printf 'Normalization produced no taxonomic records.\n' >&2
            exit 1
          fi

      - name: Enrich stable traits
        run: |
          set -Eeuo pipefail

          python "$ENRICHER" \
            --input "$NORMALIZED_FILE" \
            --output "$ENRICHED_FILE"

          if [[ ! -s "$ENRICHED_FILE" ]]; then
            printf 'Trait enrichment produced no taxonomic records.\n' >&2
            exit 1
          fi

      - name: Initialize icon database schema
        run: |
          set -Eeuo pipefail

          python "$ICON_INDEX" \
            --database "$TAXONOMY_DB" \
            init

      - name: Import taxonomy into icon database
        run: |
          set -Eeuo pipefail

          python "$ICON_INDEX" \
            --database "$TAXONOMY_DB" \
            import-jsonl \
            --input "$ENRICHED_FILE" \
            --strict

      - name: Reset icon queue for full rebuild
        if: env.FORCE_REBUILD == 'true'
        run: |
          set -Eeuo pipefail

          rm -rf \
            "$MASTER_DIR" \
            "$ICON_ROOT/512" \
            "$ICON_ROOT/256" \
            "$ICON_ROOT/128" \
            "$ICON_ROOT/64" \
            "$ICON_ROOT/32" \
            "$ICON_ROOT/sprites"

          rm -f \
            "$MANIFEST_FILE" \
            "$REPORT_FILE" \
            "$CHECKSUM_FILE" \
            "$SPRITE_INDEX"

          python "$ICON_INDEX" \
            --database "$TAXONOMY_DB" \
            reset-icons

      - name: Export pending icon queue
        run: |
          set -Eeuo pipefail

          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import sqlite3
          from pathlib import Path

          database = Path(os.environ["TAXONOMY_DB"])
          queue_file = Path(os.environ["QUEUE_FILE"])
          queue_file.parent.mkdir(parents=True, exist_ok=True)

          connection = sqlite3.connect(database)
          connection.row_factory = sqlite3.Row

          rows = connection.execute(
              """
              SELECT
                  t.taxon_key,
                  t.provider,
                  t.provider_id,
                  t.scientific_name,
                  t.canonical_name,
                  t.common_name,
                  t.rank,
                  t.status,
                  t.parent_key,
                  t.accepted_key,
                  t.lineage_json,
                  t.traits_json
              FROM iconforge_taxa AS t
              JOIN iconforge_icons AS i
                ON i.taxon_key = t.taxon_key
              WHERE i.state IN ('pending', 'stale', 'failed')
              ORDER BY
                  CASE t.rank
                      WHEN 'domain' THEN 0
                      WHEN 'superkingdom' THEN 0
                      WHEN 'kingdom' THEN 1
                      WHEN 'subkingdom' THEN 2
                      WHEN 'phylum' THEN 3
                      WHEN 'division' THEN 3
                      WHEN 'subphylum' THEN 4
                      WHEN 'class' THEN 5
                      WHEN 'subclass' THEN 6
                      WHEN 'order' THEN 7
                      WHEN 'suborder' THEN 8
                      WHEN 'family' THEN 9
                      WHEN 'subfamily' THEN 10
                      WHEN 'tribe' THEN 11
                      WHEN 'genus' THEN 12
                      WHEN 'subgenus' THEN 13
                      WHEN 'species' THEN 14
                      WHEN 'subspecies' THEN 15
                      WHEN 'variety' THEN 16
                      WHEN 'form' THEN 17
                      WHEN 'strain' THEN 18
                      WHEN 'cultivar' THEN 18
                      WHEN 'isolate' THEN 19
                      ELSE 100
                  END,
                  t.scientific_name
              """
          ).fetchall()

          with queue_file.open("w", encoding="utf-8") as handle:
              for row in rows:
                  record = {
                      "id": row["taxon_key"],
                      "source": row["provider"],
                      "source_id": row["provider_id"],
                      "scientific_name": row["scientific_name"],
                      "canonical_name": row["canonical_name"],
                      "common_name": row["common_name"],
                      "rank": row["rank"],
                      "status": row["status"],
                      "parent_id": row["parent_key"],
                      "accepted_id": row["accepted_key"],
                      "lineage": json.loads(row["lineage_json"]),
                      "traits": json.loads(row["traits_json"]),
                  }
                  handle.write(
                      json.dumps(
                          record,
                          ensure_ascii=False,
                          sort_keys=True,
                      )
                      + "\n"
                  )

          connection.close()

          print(f"queued={len(rows)}")
          PY

      - name: Show icon queue statistics
        run: |
          set -Eeuo pipefail

          python "$ICON_INDEX" \
            --database "$TAXONOMY_DB" \
            queue

      - name: Verify queued identities
        if: hashFiles('static/data/taxonomy/normalized/icon-queue.jsonl') != ''
        run: |
          set -Eeuo pipefail

          if [[ -s "$QUEUE_FILE" ]]; then
            python "$ICON_FORGE" verify \
              --input "$QUEUE_FILE"
          else
            printf 'No pending or stale taxa require rendering.\n'
          fi

      - name: Generate queued master icons
        run: |
          set -Eeuo pipefail

          if [[ ! -s "$QUEUE_FILE" ]]; then
            printf 'No queued icons to generate.\n'
            exit 0
          fi

          args=(
            --input "$QUEUE_FILE"
            --forge "$ICON_FORGE"
            --output "$MASTER_DIR"
            --manifest "$MANIFEST_FILE"
            --size "$ICON_SIZE"
          )

          if [[ "$FORCE_REBUILD" != "true" ]]; then
            args+=(--incremental)
          fi

          python "$ICON_BUILDER" "${args[@]}"

      - name: Update database from generated manifest
        run: |
          set -Eeuo pipefail

          if [[ ! -f "$MANIFEST_FILE" ]]; then
            printf 'No icon manifest was produced; database update skipped.\n'
            exit 0
          fi

          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import sqlite3
          from datetime import datetime, timezone
          from pathlib import Path

          def now() -> str:
              return datetime.now(timezone.utc).replace(microsecond=0).isoformat()

          def sha256_file(path: Path) -> str:
              digest = hashlib.sha256()
              with path.open("rb") as handle:
                  while True:
                      block = handle.read(1024 * 1024)
                      if not block:
                          break
                      digest.update(block)
              return digest.hexdigest()

          database = Path(os.environ["TAXONOMY_DB"])
          manifest_path = Path(os.environ["MANIFEST_FILE"])
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))

          connection = sqlite3.connect(database)
          timestamp = now()
          ready = 0
          failed = 0

          for entry in manifest.get("icons", []):
              taxon_key = str(entry.get("id") or "")
              icon_path = Path(str(entry.get("file") or ""))
              parameters = entry.get("parameters") or {}

              if not taxon_key:
                  failed += 1
                  continue

              if not icon_path.exists():
                  connection.execute(
                      """
                      UPDATE iconforge_icons
                      SET
                          state = 'failed',
                          attempts = attempts + 1,
                          last_error = ?,
                          updated_at = ?
                      WHERE taxon_key = ?
                      """,
                      (
                          f"Generated icon file is missing: {icon_path}",
                          timestamp,
                          taxon_key,
                      ),
                  )
                  failed += 1
                  continue

              connection.execute(
                  """
                  UPDATE iconforge_icons
                  SET
                      identity_sha256 = ?,
                      lineage_sha256 = ?,
                      generator_version = ?,
                      icon_path = ?,
                      icon_sha256 = ?,
                      icon_size = ?,
                      state = 'ready',
                      attempts = attempts + 1,
                      last_error = '',
                      generated_at = ?,
                      updated_at = ?
                  WHERE taxon_key = ?
                  """,
                  (
                      str(parameters.get("identity_sha256") or ""),
                      str(parameters.get("lineage_sha256") or ""),
                      str(entry.get("generator_version") or ""),
                      icon_path.as_posix(),
                      sha256_file(icon_path),
                      int(entry.get("size") or 0),
                      timestamp,
                      timestamp,
                      taxon_key,
                  ),
              )
              ready += 1

          connection.commit()
          connection.close()

          print(f"database_ready={ready} database_failed={failed}")
          PY

      - name: Generate icon derivatives
        run: |
          set -Eeuo pipefail

          if [[ ! -d "$MASTER_DIR" ]]; then
            printf 'Master icon directory does not exist.\n' >&2
            exit 1
          fi

          rm -rf \
            "$ICON_ROOT/512" \
            "$ICON_ROOT/256" \
            "$ICON_ROOT/128" \
            "$ICON_ROOT/64" \
            "$ICON_ROOT/32"

          python "$DERIVATIVE_BUILDER" \
            --input "$MASTER_DIR" \
            --output "$ICON_ROOT" \
            --sizes 512 256 128 64 32

      - name: Generate sprite sheet
        run: |
          set -Eeuo pipefail

          rm -f "$SPRITE_FILE" "$SPRITE_INDEX"

          python "$SPRITE_BUILDER" \
            --input "$ICON_ROOT/64" \
            --output "$SPRITE_FILE" \
            --index "$SPRITE_INDEX" \
            --cell-size 64 \
            --columns 16

      - name: Verify generated assets
        run: |
          set -Eeuo pipefail

          if [[ -f "$MANIFEST_FILE" ]]; then
            python "$ICON_VERIFIER" \
              --manifest "$MANIFEST_FILE" \
              --image-root "$ICON_ROOT"
          else
            printf 'No new manifest was created; checking database queue only.\n'
          fi

          python "$ICON_INDEX" \
            --database "$TAXONOMY_DB" \
            queue

      - name: Write build report
        run: |
          set -Eeuo pipefail

          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import sqlite3
          from pathlib import Path

          database = Path(os.environ["TAXONOMY_DB"])
          report_path = Path(os.environ["REPORT_FILE"])
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          connection = sqlite3.connect(database)
          connection.row_factory = sqlite3.Row

          total_taxa = connection.execute(
              "SELECT COUNT(*) AS count FROM iconforge_taxa"
          ).fetchone()["count"]

          state_rows = connection.execute(
              """
              SELECT state, COUNT(*) AS count
              FROM iconforge_icons
              GROUP BY state
              ORDER BY state
              """
          ).fetchall()

          rank_rows = connection.execute(
              """
              SELECT rank, COUNT(*) AS count
              FROM iconforge_taxa
              GROUP BY rank
              ORDER BY count DESC, rank ASC
              """
          ).fetchall()

          connection.close()

          state_counts = {
              row["state"]: row["count"]
              for row in state_rows
          }

          rank_counts = {
              row["rank"]: row["count"]
              for row in rank_rows
          }

          report = {
              "database": database.as_posix(),
              "master_size": int(os.environ["ICON_SIZE"]),
              "total_taxa": total_taxa,
              "state_counts": state_counts,
              "rank_counts": rank_counts,
          }

          report_path.parent.mkdir(parents=True, exist_ok=True)
          report_path.write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write("# Speciedex icon build\n\n")
              summary.write(f"- Indexed taxa: {total_taxa}\n")
              summary.write(f"- Master size: {report['master_size']} px\n")

              for state, count in state_counts.items():
                  summary.write(f"- {state}: {count}\n")

              summary.write("\n## Taxa by rank\n\n")
              summary.write("| Rank | Count |\n")
              summary.write("|---|---:|\n")

              for rank, count in rank_counts.items():
                  summary.write(f"| {rank} | {count} |\n")
          PY

      - name: Write SHA-256 checksums
        run: |
          set -Eeuo pipefail

          : > "$CHECKSUM_FILE"

          while IFS= read -r -d '' file; do
            sha256sum "$file" >> "$CHECKSUM_FILE"
          done < <(
            find \
              static/data/icons \
              static/data/taxonomy \
              static/images/taxa \
              -type f \
              ! -path "$CHECKSUM_FILE" \
              ! -name '*.sqlite3-wal' \
              ! -name '*.sqlite3-shm' \
              -print0 \
            | sort -z
          )

      - name: Upload generated assets
        uses: actions/upload-artifact@v4
        with:
          name: speciedex-taxonomic-icons-${{ github.run_number }}
          path: |
            static/data/icons/
            static/data/taxonomy/
            static/images/taxa/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

      - name: Commit updated icon assets
        if: github.ref == 'refs/heads/main'
        run: |
          set -Eeuo pipefail

          rm -f \
            "$TAXONOMY_DB-wal" \
            "$TAXONOMY_DB-shm"

          git config user.name "speciedex-icon-bot"
          git config user.email "speciedex-icon-bot@users.noreply.github.com"

          git add \
            static/data/icons \
            static/data/taxonomy \
            static/images/taxa

          if git diff --cached --quiet; then
            printf 'No generated icon changes to commit.\n'
            exit 0
          fi

          git commit \
            -m "chore(icons): update deterministic taxonomic glyphs" \
            -m "Generated by Speciedex Icon Forge in GitHub Actions run ${GITHUB_RUN_ID}."

          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
