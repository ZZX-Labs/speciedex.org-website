# ============================================================================
# Speciedex.org
# nginx.conf
# Static Website Server Configuration
# ============================================================================

worker_processes auto;

error_log logs/error.log warn;
pid logs/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {

    # ========================================================================
    # MIME Types
    # ========================================================================

    include mime.types;
    default_type application/octet-stream;

    charset utf-8;

    # ========================================================================
    # Logging
    # ========================================================================

    log_format main
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent"';

    access_log logs/access.log main;

    # ========================================================================
    # Core HTTP
    # ========================================================================

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 1000;

    server_tokens off;

    types_hash_max_size 4096;

    # ========================================================================
    # Request Limits
    # ========================================================================

    client_max_body_size 16m;
    client_body_buffer_size 128k;

    # ========================================================================
    # Compression
    # ========================================================================

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;

    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/ld+json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf;

    # ========================================================================
    # File Cache
    # ========================================================================

    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ========================================================================
    # HTTP Server
    # ========================================================================

    server {
        listen 80;
        listen [::]:80;

        server_name
            speciedex.org
            www.speciedex.org
            localhost;

        # --------------------------------------------------------------------
        # Website Root
        # --------------------------------------------------------------------

        root html;
        index index.html;

        # --------------------------------------------------------------------
        # Security Headers
        # --------------------------------------------------------------------

        add_header X-Content-Type-Options "nosniff" always;

        add_header X-Frame-Options "SAMEORIGIN" always;

        add_header Referrer-Policy
            "strict-origin-when-cross-origin"
            always;

        add_header Permissions-Policy
            "camera=(), microphone=(), geolocation=(), payment=()"
            always;

        # --------------------------------------------------------------------
        # Content Security Policy
        #
        # Allows the site's own CSS, JavaScript, fonts, images, media and
        # fetch() requests used by data-include and JSON data modules.
        # --------------------------------------------------------------------

        add_header Content-Security-Policy "
            default-src 'self';
            base-uri 'self';
            object-src 'none';
            frame-ancestors 'self';
            form-action 'self';
            script-src 'self';
            style-src 'self';
            img-src 'self' data: blob:;
            font-src 'self' data:;
            media-src 'self' blob:;
            connect-src 'self';
            worker-src 'self' blob:;
            manifest-src 'self';
        " always;

        # ====================================================================
        # Main Website
        # ====================================================================

        location / {
            try_files
                $uri
                $uri/
                $uri/index.html
                =404;
        }

        # ====================================================================
        # HTML Documents
        #
        # HTML should revalidate so updated pages become visible immediately.
        # ====================================================================

        location ~* \.html$ {
            expires -1;

            add_header Cache-Control
                "no-cache, no-store, must-revalidate"
                always;

            try_files $uri =404;
        }

        # ====================================================================
        # HTML Partials
        #
        # Used by:
        #
        #   <div data-include="header"></div>
        #   <div data-include="splash"></div>
        #   <div data-include="footer"></div>
        #
        # JavaScript fetches:
        #
        #   /_partials/header.html
        #   /_partials/splash.html
        #   /_partials/footer.html
        #
        # These must remain directly fetchable.
        # ====================================================================

        location ^~ /_partials/ {
            try_files $uri =404;

            expires -1;

            add_header Cache-Control
                "no-cache, no-store, must-revalidate"
                always;

            add_header X-Content-Type-Options
                "nosniff"
                always;
        }

        # ====================================================================
        # Public JavaScript Entry Point
        #
        # Every page loads only:
        #
        #   /static/script.js
        #
        # That wrapper loads:
        #
        #   /static/js/script.js
        #
        # which loads the remaining JavaScript modules.
        # ====================================================================

        location = /static/script.js {
            try_files $uri =404;

            expires -1;

            add_header Cache-Control
                "no-cache, must-revalidate"
                always;
        }

        # ====================================================================
        # Public CSS Entry Point
        #
        # Every page loads:
        #
        #   /static/styles.css
        #
        # which imports:
        #
        #   /static/css/styles.css
        #
        # ====================================================================

        location = /static/styles.css {
            try_files $uri =404;

            expires -1;

            add_header Cache-Control
                "no-cache, must-revalidate"
                always;
        }

        # ====================================================================
        # Internal JavaScript Modules
        # ====================================================================

        location ^~ /static/js/ {
            try_files $uri =404;

            expires 1h;

            add_header Cache-Control
                "public, max-age=3600"
                always;
        }

        # ====================================================================
        # Internal CSS Modules
        # ====================================================================

        location ^~ /static/css/ {
            try_files $uri =404;

            expires 1h;

            add_header Cache-Control
                "public, max-age=3600"
                always;
        }

        # ====================================================================
        # Dynamic Static Data
        #
        # Statistics, releases, status, activity and similar JSON files should
        # revalidate frequently rather than receiving long immutable caching.
        # ====================================================================

        location ^~ /static/data/ {
            try_files $uri =404;

            expires -1;

            add_header Cache-Control
                "no-cache, must-revalidate"
                always;

            add_header X-Content-Type-Options
                "nosniff"
                always;
        }

        # ====================================================================
        # Images
        # ====================================================================

        location ^~ /static/images/ {
            try_files $uri =404;

            expires 30d;

            add_header Cache-Control
                "public, max-age=2592000"
                always;
        }

        # ====================================================================
        # Icons
        # ====================================================================

        location ^~ /static/icons/ {
            try_files $uri =404;

            expires 30d;

            add_header Cache-Control
                "public, max-age=2592000"
                always;
        }

        # ====================================================================
        # Fonts
        # ====================================================================

        location ^~ /static/fonts/ {
            try_files $uri =404;

            expires 30d;

            add_header Cache-Control
                "public, max-age=2592000"
                always;

            add_header Access-Control-Allow-Origin
                "*"
                always;
        }

        # ====================================================================
        # Media
        # ====================================================================

        location ^~ /static/media/ {
            try_files $uri =404;

            expires 7d;

            add_header Cache-Control
                "public, max-age=604800"
                always;
        }

        # ====================================================================
        # Generic Static Assets
        #
        # Catch assets that are not covered by the more specific locations.
        # ====================================================================

        location ~* \.(?:png|jpg|jpeg|gif|webp|ico|svg|woff|woff2|ttf|otf|mp3|ogg|wav|flac|mp4|webm)$ {
            try_files $uri =404;

            expires 30d;

            add_header Cache-Control
                "public, max-age=2592000"
                always;
        }

        # ====================================================================
        # robots.txt
        # ====================================================================

        location = /robots.txt {
            try_files $uri =404;

            access_log off;

            expires 1h;
        }

        # ====================================================================
        # sitemap.xml
        # ====================================================================

        location = /sitemap.xml {
            try_files $uri =404;

            access_log off;

            expires 1h;
        }

        # ====================================================================
        # favicon.ico
        # ====================================================================

        location = /favicon.ico {
            try_files
                $uri
                /static/icons/favicon.ico
                =404;

            access_log off;

            log_not_found off;

            expires 30d;
        }

        # ====================================================================
        # Block Hidden Files
        #
        # .well-known remains available for standards such as ACME.
        # ====================================================================

        location ~ /\.(?!well-known/) {
            deny all;

            access_log off;
            log_not_found off;
        }

        # ====================================================================
        # Block Development / Repository Files
        # ====================================================================

        location ~* /(?:\.git|\.svn|\.hg)(?:/|$) {
            deny all;
        }

        location ~* \.(?:bak|conf|ini|log|sh|sql|sqlite|sqlite3|env|pem|key)$ {
            deny all;
        }

        # ====================================================================
        # Custom Error Pages
        # ====================================================================

        error_page 404 /404/index.html;

        location = /404/index.html {
            internal;
        }

        error_page 500 502 503 504 /500/index.html;

        location = /500/index.html {
            internal;
        }
    }
}
